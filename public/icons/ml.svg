<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- Gradient for the 'M' representing data flow and high-performance tech -->
    <linearGradient id="dataTechGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ADD8" />
      <stop offset="100%" stop-color="#4B8BBE" />
    </linearGradient>
  </defs>
  
  <!-- Dark background representing a code editor or terminal environment -->
  <rect width="256" height="256" fill="#0d1117" rx="24"/>

  <!-- Letter M -->
  <path d="M 64 176 L 64 80 L 96 128 L 128 80 L 128 176"
        fill="none" stroke="url(#dataTechGradient)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Letter L -->
  <path d="M 152 80 L 152 176 L 192 176"
        fill="none" stroke="#e6edf3" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Terminal cursor indicator -->
  <rect x="206" y="162" width="14" height="14" fill="#10b981" rx="2" />
</svg>
